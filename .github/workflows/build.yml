name: Build & Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Patch versionCode
        run: |
          VERSION_CODE=$((1000 + ${{ github.run_number }}))
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk IcCardScanner-v${{ env.VERSION_CODE }}.apk
      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_CODE }}
          name: "Latest Build (v${{ env.VERSION_CODE }})"
          files: IcCardScanner-v${{ env.VERSION_CODE }}.apk
          body: "Auto-built from commit ${{ github.sha }}"
          make_latest: true
